worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 0; # No limit — Express handles upload size

    server {
        listen 80;
        server_name _;

        # Raw file serving — nginx serves directly, bypasses Express entirely
        # If index.html exists in a directory, serve it (enables static site hosting)
        location /files/ {
            alias /srv/files/;
            try_files $uri $uri/ $uri/index.html =404;
            autoindex off;
        }

        # API proxy to Express backend
        location /api/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;   # Allow time for large uploads
            proxy_send_timeout 300s;
            proxy_request_buffering off; # Stream uploads directly to Express
            proxy_buffer_size 16k;      # Accommodate large Set-Cookie headers (Cognito JWTs)
            proxy_buffers 4 16k;
        }

        # SPA fallback — check for index.html in served files first, then React app
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ @check_index;
        }

        # If no static asset matched, check if an index.html exists in the files volume
        location @check_index {
            root /srv/files;
            try_files $uri/index.html @spa;
        }

        # Final fallback — serve the React SPA
        location @spa {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }
    }
}
